version: "2"

linters:
  default: none
  enable:
    - bodyclose
    - embeddedstructfieldcheck
    - errcheck
    - funcorder
    - gocheckcompilerdirectives
    - gocognit
    - gocritic
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - lll
    - mirror
    - misspell
    - modernize
    - nakedret
    - revive
    - staticcheck
    - tagliatelle
    - unconvert
    - unused
    - wsl_v5
  settings:
    funcorder:
      struct-method: false
    goconst:
      min-len: 2
      min-occurrences: 3
      ignore-tests: true
    lll:
      line-length: 120
    tagliatelle:
      case:
        rules:
          json: camel
          yaml: snake
          bson: camel
        use-field-name: true
  exclusions:
    generated: strict
    presets:
      - comments
      - std-error-handling
    rules:
      - linters:
          - staticcheck
        text: "QF1008: " # https://staticcheck.dev/docs/checks#QF1008

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/shirakiya/my-nature-remo

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: false

run:
  timeout: 10m
